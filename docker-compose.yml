version: '3.8'

services:
  app:
    container_name: next-template
    build: .
    init: true

    ports:
      - '3000:3000'

    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    # Uncomment to enable persistent file storage
    # volumes:
    #   - ./data:/app/data

    restart: unless-stopped
